<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoPet - Healing Companion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap');

        :root {
            --bg: #0d1117;
            --primary: #7C6EFA;
            --accent: #00E5C0;
            --danger: #FF5370;
            --success: #06D6A0;
            --warn: #FFD166;
            --text: #eef2ff;
            --muted: #7b8ab8;
            --border: rgba(255,255,255,0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 390px;
            height: 100svh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #131929 0%, #0d1117 100%);
        }

        @media (min-width: 420px) {
            .app {
                height: 92vh;
                border-radius: 32px;
                border: 1px solid var(--border);
                box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            }
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(13,17,23,0.8);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .level-badge {
            background: rgba(124,110,250,0.15);
            border: 1px solid rgba(124,110,250,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* CAMERA */
        .camera-section {
            position: relative;
            height: 200px;
            background: #050810;
            flex-shrink: 0;
            overflow: hidden;
        }
        video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }
        .cam-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(13,17,23,0.98) 100%);
            pointer-events: none;
        }
        .face-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -52%);
            width: 120px; height: 150px;
            pointer-events: none;
        }
        .face-frame span {
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.8;
        }
        .face-frame span:nth-child(1) { top:0; left:0;   border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
        .face-frame span:nth-child(2) { top:0; right:0;  border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
        .face-frame span:nth-child(3) { bottom:0; right:0; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }
        .face-frame span:nth-child(4) { bottom:0; left:0;  border-width:0 0 2px 2px; border-radius:0 0 0 4px; }

        .cam-hint {
            position: absolute;
            top: 10px; left: 10px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.5);
            padding: 3px 9px;
            border-radius: 20px;
        }
        .emotion-badge {
            position: absolute;
            bottom: 12px; left: 12px;
            background: rgba(13,17,23,0.85);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--accent);
            backdrop-filter: blur(10px);
            transition: all 0.4s;
        }
        .scan-btn {
            position: absolute;
            bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,229,192,0.4);
            color: var(--accent);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            transition: 0.2s;
            backdrop-filter: blur(10px);
        }
        .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .scan-btn.scanning { color: var(--warn); border-color: rgba(255,209,102,0.4); animation: scanPulse 1s infinite; }
        @keyframes scanPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* PET */
        .pet-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 22px 0;
            gap: 10px;
        }
        .pet-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
        .pet-aura {
            position: absolute;
            width: 110px; height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,110,250,0.3) 0%, transparent 70%);
            animation: breathe 3s ease-in-out infinite;
            transition: background 0.8s ease;
        }
        @keyframes breathe { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.2);opacity:1} }
        .pet-emoji {
            font-size: 75px;
            position: relative; z-index: 1;
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
        }
        .pet-mood { font-size: 0.82rem; color: var(--muted); font-weight: 600; text-align: center; }

        /* BARS */
        .bars-wrap { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .bar-row { display: flex; align-items: center; gap: 8px; }
        .bar-label { width: 60px; font-size: 0.67rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
        .bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 10px; width: 0%; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
        .f-happy     { background: linear-gradient(90deg,#FFD166,#FF9A3C); }
        .f-sad       { background: linear-gradient(90deg,#6EB5FF,#A78BFA); }
        .f-angry     { background: linear-gradient(90deg,#FF5370,#FF8C42); }
        .f-fearful   { background: linear-gradient(90deg,#C084FC,#818CF8); }
        .f-surprised { background: linear-gradient(90deg,#00E5C0,#06D6A0); }
        .f-neutral   { background: linear-gradient(90deg,#64748b,#94a3b8); }
        .bar-val { width: 30px; text-align: right; font-size: 0.67rem; color: var(--muted); font-family: 'Space Grotesk', monospace; flex-shrink: 0; }

        /* INPUT */
        .input-section {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 14px 18px 18px;
            flex-shrink: 0;
        }
        .transcript-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
            min-height: 46px;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            font-size: 0.83rem; color: var(--muted); font-style: italic;
            margin-bottom: 12px; transition: all 0.3s;
        }
        .transcript-box.lit { color: var(--text); font-style: normal; border-color: rgba(124,110,250,0.3); }
        .controls { display: flex; justify-content: center; gap: 16px; }
        .ctrl-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .mic-btn {
            width: 58px; height: 58px;
            border-radius: 50%; border: none;
            background: var(--primary); color: white; font-size: 22px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(124,110,250,0.4);
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .mic-btn.listening { background: var(--danger); animation: pulseRed 1.5s infinite; }
        @keyframes pulseRed { 0%{box-shadow:0 0 0 0 rgba(255,83,112,0.7)} 70%{box-shadow:0 0 0 12px rgba(255,83,112,0)} 100%{box-shadow:0 0 0 0 rgba(255,83,112,0)} }
        .btn-label { font-size: 0.68rem; color: var(--muted); font-weight: 600; }

        /* OVERLAY */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(10,14,22,0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; opacity: 0; pointer-events: none;
            transition: opacity 0.4s; text-align: center; padding: 30px;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        .ov-icon { font-size: 65px; margin-bottom: 14px; }
        .overlay h2 { font-family: 'Space Grotesk',sans-serif; font-size: 1.3rem; margin-bottom: 8px; }
        .overlay p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 22px; }
        .btn-close {
            background: var(--primary); color: white; border: none;
            padding: 12px 28px; border-radius: 25px;
            font-size: 0.92rem; font-weight: 700; cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }

        #captureCanvas { display: none; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="logo">EmoPet.</div>
        <div class="level-badge">Lv. <span id="petLevel">1</span></div>
    </header>

    <div class="camera-section">
        <video id="videoEl" autoplay muted playsinline></video>
        <div class="cam-gradient"></div>
        <div class="face-frame"><span></span><span></span><span></span><span></span></div>
        <div class="cam-hint">📷 Kamera aktif</div>
        <div class="emotion-badge" id="emotionBadge">Arahkan wajahmu</div>
        <button class="scan-btn" id="scanBtn">🔍 Scan Ekspresi</button>
    </div>

    <div class="pet-section">
        <div class="pet-wrap">
            <div class="pet-aura" id="petAura"></div>
            <div class="pet-emoji" id="petEmoji">🥚</div>
        </div>
        <div class="pet-mood" id="petMood">Tekan Scan untuk mendeteksi ekspresimu</div>

        <div class="bars-wrap">
            <div class="bar-row"><span class="bar-label">😊 Senang</span><div class="bar-track"><div class="bar-fill f-happy"     id="b-happy"></div></div><span class="bar-val" id="v-happy">—</span></div>
            <div class="bar-row"><span class="bar-label">😢 Sedih</span> <div class="bar-track"><div class="bar-fill f-sad"       id="b-sad"></div></div><span class="bar-val" id="v-sad">—</span></div>
            <div class="bar-row"><span class="bar-label">😠 Marah</span> <div class="bar-track"><div class="bar-fill f-angry"     id="b-angry"></div></div><span class="bar-val" id="v-angry">—</span></div>
            <div class="bar-row"><span class="bar-label">😨 Takut</span> <div class="bar-track"><div class="bar-fill f-fearful"   id="b-fearful"></div></div><span class="bar-val" id="v-fearful">—</span></div>
            <div class="bar-row"><span class="bar-label">😲 Kaget</span> <div class="bar-track"><div class="bar-fill f-surprised" id="b-surprised"></div></div><span class="bar-val" id="v-surprised">—</span></div>
            <div class="bar-row"><span class="bar-label">😐 Netral</span><div class="bar-track"><div class="bar-fill f-neutral"   id="b-neutral"></div></div><span class="bar-val" id="v-neutral">—</span></div>
        </div>
    </div>

    <div class="input-section">
        <div class="transcript-box" id="transcript">Curhatlah... aku mendengarkan. 💬</div>
        <div class="controls">
            <div class="ctrl-btn">
                <button class="mic-btn" id="micBtn">🎤</button>
                <span class="btn-label">Curhat suara</span>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="ov-icon" id="ovIcon">🍏</div>
        <h2 id="ovTitle">Oke!</h2>
        <p id="ovDesc">Pet kamu tumbuh.</p>
        <button class="btn-close" onclick="closeOverlay()">Lanjut →</button>
    </div>
</div>

<canvas id="captureCanvas"></canvas>

<script>
let petLevel = 1;
let recognition;
let lastFaceEmotion = 'neutral';

const emotionCfg = {
    happy:     { emoji:'😇', aura:'rgba(255,209,102,0.3)',  tag:'😊 Senang!',  mood:'Aura positifmu bersinar! ☀️',   food:'🌞', resp:'Cahaya bahagiamu mengisi aku dengan energi!' },
    sad:       { emoji:'🥺', aura:'rgba(110,181,255,0.25)', tag:'😢 Sedih...',  mood:'Lagi sedih nih...',             food:'☔', resp:'Aku di sini. Peluk dulu yuk. 🫂' },
    angry:     { emoji:'👹', aura:'rgba(255,83,112,0.3)',   tag:'😠 Marah!',    mood:'Wah lagi emosi!',               food:'🌶️',resp:'Whoa energi kuat! Mau cerita lebih? 🔥' },
    fearful:   { emoji:'🙈', aura:'rgba(192,132,252,0.3)',  tag:'😨 Takut...',  mood:'Serem yaaa...',                 food:'🫣', resp:'Tenang, kamu aman di sini. 🫶' },
    surprised: { emoji:'🤩', aura:'rgba(0,229,192,0.3)',    tag:'😲 Kaget!',    mood:'Woah, kaget banget!',           food:'✨', resp:'Wow! Energi kaget itu bikin aku ikut excited!' },
    disgusted: { emoji:'🤢', aura:'rgba(132,204,22,0.25)',  tag:'🤢 Jijik!',    mood:'Ewwww...',                      food:'🤢', resp:'Eww! Tapi kamu tetap kuat! 💪' },
    neutral:   { emoji:'🐣', aura:'rgba(124,110,250,0.25)', tag:'😐 Netral',    mood:'Kalem aja nih...',              food:'🍏', resp:'Makanan sehat! Pet tetap stabil. 🌿' },
};

const videoEl      = document.getElementById('videoEl');
const scanBtn      = document.getElementById('scanBtn');
const emotionBadge = document.getElementById('emotionBadge');
const petEmoji     = document.getElementById('petEmoji');
const petAura      = document.getElementById('petAura');
const petMood      = document.getElementById('petMood');
const petLevelEl   = document.getElementById('petLevel');
const transcript   = document.getElementById('transcript');
const micBtn       = document.getElementById('micBtn');
const capCanvas    = document.getElementById('captureCanvas');

async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user', width:320, height:240 } });
        videoEl.srcObject = stream;
        videoEl.onloadedmetadata = () => {
            // auto scan once ready
            setTimeout(doScan, 1500);
            setInterval(doScan, 8000);
        };
    } catch(e) {
        emotionBadge.innerText = '❌ Kamera ditolak';
        petMood.innerText = 'Izinkan akses kamera lalu refresh';
    }
    setupSpeech();
}

function captureFrame() {
    const w = videoEl.videoWidth || 320;
    const h = videoEl.videoHeight || 240;
    capCanvas.width = w; capCanvas.height = h;
    const ctx = capCanvas.getContext('2d');
    ctx.save(); ctx.scale(-1,1); ctx.drawImage(videoEl,-w,0,w,h); ctx.restore();
    // shrink for API efficiency
    const sm = document.createElement('canvas');
    sm.width = 240; sm.height = 180;
    sm.getContext('2d').drawImage(capCanvas,0,0,240,180);
    return sm.toDataURL('image/jpeg',0.65).split(',')[1];
}

async function callClaude(base64img) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 200,
            messages: [{
                role: 'user',
                content: [
                    { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:base64img } },
                    { type:'text',  text:`Look at the face in this image and estimate emotional expression scores.
Reply ONLY with raw JSON, no markdown, no explanation:
{"dominant":"happy","scores":{"happy":0.0,"sad":0.0,"angry":0.0,"fearful":0.0,"surprised":0.0,"neutral":0.0}}
dominant = one of: happy sad angry fearful surprised disgusted neutral
All scores sum to 1.0. If no face, dominant=neutral scores.neutral=1.` }
                ]
            }]
        })
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const raw = (data.content || []).map(b => b.text||'').join('');
    const json = raw.replace(/```[a-z]*|```/g,'').trim();
    return JSON.parse(json);
}

async function doScan() {
    if (scanBtn.disabled || videoEl.readyState < 2) return;
    scanBtn.disabled = true;
    scanBtn.classList.add('scanning');
    scanBtn.innerText = '⏳ Menganalisis...';
    try {
        const img = captureFrame();
        const result = await callClaude(img);
        lastFaceEmotion = result.dominant || 'neutral';
        updateBars(result.scores || {});
        updatePet(lastFaceEmotion);
        emotionBadge.innerText = emotionCfg[lastFaceEmotion]?.tag || lastFaceEmotion;
    } catch(e) {
        console.error(e);
        emotionBadge.innerText = '⚠️ Gagal — coba lagi';
    }
    scanBtn.disabled = false;
    scanBtn.classList.remove('scanning');
    scanBtn.innerText = '🔍 Scan Ekspresi';
}

function updateBars(scores) {
    ['happy','sad','angry','fearful','surprised','neutral'].forEach(k => {
        const pct = Math.round((scores[k]||0)*100);
        document.getElementById('b-'+k).style.width = pct+'%';
        document.getElementById('v-'+k).innerText = pct+'%';
    });
}

function updatePet(emotion) {
    const cfg = emotionCfg[emotion] || emotionCfg.neutral;
    petEmoji.innerText = cfg.emoji;
    petAura.style.background = `radial-gradient(circle,${cfg.aura} 0%,transparent 70%)`;
    petMood.innerText = cfg.mood;
    petEmoji.style.transform = 'scale(1.3)';
    setTimeout(()=> petEmoji.style.transform='scale(1)', 400);
}

function setupSpeech() {
    if (!('webkitSpeechRecognition' in window)) return;
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'id-ID';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { micBtn.classList.add('listening'); transcript.innerText='🎙️ Mendengarkan...'; transcript.classList.remove('lit'); };
    recognition.onend = () => micBtn.classList.remove('listening');
    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        transcript.innerText = `"${text}"`;
        transcript.classList.add('lit');
        processCurhat(text.toLowerCase());
    };
    recognition.onerror = () => { transcript.innerText='⚠️ Mic error. Coba lagi.'; micBtn.classList.remove('listening'); };
}

function detectTextEmotion(t) {
    if (t.match(/marah|kesel|benci|jengkel|emosi/)) return 'angry';
    if (t.match(/sedih|nangis|galau|sepi|lelah|kecewa|hampa/)) return 'sad';
    if (t.match(/senang|bahagia|syukur|senyum|haha|wkwk|mantap/)) return 'happy';
    if (t.match(/takut|khawatir|cemas|gelisah|ngeri/)) return 'fearful';
    if (t.match(/kaget|terkejut|wow|serius/)) return 'surprised';
    return null;
}

async function processCurhat(text) {
    const textEmo = detectTextEmotion(text);
    let faceEmo = lastFaceEmotion;
    if (videoEl.readyState >= 2) {
        try {
            const res = await callClaude(captureFrame());
            faceEmo = res.dominant || lastFaceEmotion;
            updateBars(res.scores||{});
            updatePet(faceEmo);
        } catch(e) {}
    }
    const finalEmo = textEmo || faceEmo;
    petLevel++;
    petLevelEl.innerText = petLevel;
    showOverlay(finalEmo);
}

function showOverlay(emotion) {
    const cfg = emotionCfg[emotion] || emotionCfg.neutral;
    document.getElementById('ovIcon').innerText = cfg.food;
    document.getElementById('ovTitle').innerText = cfg.tag;
    document.getElementById('ovDesc').innerText = cfg.resp;
    document.getElementById('overlay').classList.add('active');
}

function closeOverlay() {
    document.getElementById('overlay').classList.remove('active');
    transcript.innerText = 'Ada yang lain? Aku siap mendengar. 💬';
    transcript.classList.remove('lit');
}

micBtn.addEventListener('click', () => { if (recognition) recognition.start(); });
scanBtn.addEventListener('click', doScan);

init();
</script>
</body>
</html>
