<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoPet - Healing Companion</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap');

        :root {
            --bg: #0d1117;
            --surface: rgba(22, 30, 46, 0.85);
            --primary: #7C6EFA;
            --accent: #00E5C0;
            --danger: #FF5370;
            --warn: #FFD166;
            --success: #06D6A0;
            --text: #eef2ff;
            --muted: #7b8ab8;
            --border: rgba(255,255,255,0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Stars BG */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,0.2) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            width: 100%;
            max-width: 390px;
            height: 100svh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        @media (min-width: 420px) {
            .app {
                height: 92vh;
                border-radius: 32px;
                border: 1px solid var(--border);
                box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
            }
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px 14px;
            background: rgba(13,17,23,0.8);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 10;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .level-badge {
            background: rgba(124,110,250,0.15);
            border: 1px solid rgba(124,110,250,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* CAMERA SECTION */
        .camera-section {
            position: relative;
            background: #0a0e16;
            overflow: hidden;
            flex-shrink: 0;
            height: 220px;
        }

        #videoEl {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
            display: block;
        }

        #faceCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .camera-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(13,17,23,0.95) 100%);
            pointer-events: none;
        }

        /* Face frame corners */
        .face-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -52%);
            width: 130px;
            height: 155px;
            pointer-events: none;
        }
        .face-frame::before, .face-frame::after,
        .face-frame .corner-br, .face-frame .corner-bl {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.7;
        }
        .face-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
        .face-frame::after  { top: 0; right: 0; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
        .face-frame .corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
        .face-frame .corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }

        .emotion-tag {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13,17,23,0.85);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 5px 16px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.4s ease;
            color: var(--accent);
        }

        .cam-status {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: var(--muted);
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .cam-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--danger);
            animation: blink 1.5s infinite;
        }
        .cam-dot.active { background: var(--success); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* PET SECTION */
        .pet-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px 0;
        }

        .pet-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pet-aura {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,110,250,0.25) 0%, transparent 70%);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .pet-emoji {
            font-size: 80px;
            position: relative;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
        }

        .pet-mood-label {
            margin-top: 8px;
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* EMOTION BARS */
        .emotion-bars {
            width: 100%;
            padding: 0 22px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .emo-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
        }
        .emo-bar-label {
            width: 58px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.68rem;
        }
        .emo-bar-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .emo-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .bar-happy   { background: linear-gradient(90deg, #FFD166, #FF9A3C); }
        .bar-sad     { background: linear-gradient(90deg, #6EB5FF, #A78BFA); }
        .bar-angry   { background: linear-gradient(90deg, #FF5370, #FF8C42); }
        .bar-fearful { background: linear-gradient(90deg, #C084FC, #818CF8); }
        .bar-surprised { background: linear-gradient(90deg, #00E5C0, #06D6A0); }
        .bar-neutral { background: linear-gradient(90deg, #64748b, #94a3b8); }
        .emo-bar-val {
            width: 34px;
            text-align: right;
            color: var(--muted);
            font-size: 0.68rem;
            font-family: 'Space Grotesk', monospace;
        }

        /* INPUT SECTION */
        .input-section {
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 16px 20px 20px;
        }

        .transcript-box {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .transcript-box.has-text {
            color: var(--text);
            font-style: normal;
            border-color: rgba(124,110,250,0.3);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            justify-content: center;
        }

        .mic-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 24px rgba(124,110,250,0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .mic-btn:hover { transform: scale(1.05); }
        .mic-btn.listening {
            background: var(--danger);
            animation: pulseRed 1.5s infinite;
        }
        @keyframes pulseRed {
            0%   { box-shadow: 0 0 0 0 rgba(255,83,112,0.7); }
            70%  { box-shadow: 0 0 0 14px rgba(255,83,112,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,83,112,0); }
        }

        .hint-text {
            font-size: 0.75rem;
            color: var(--muted);
            text-align: center;
        }

        /* OVERLAY */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10,14,22,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            text-align: center;
            padding: 30px;
        }
        .overlay.active { opacity: 1; pointer-events: all; }
        .overlay-icon { font-size: 70px; margin-bottom: 16px; }
        .overlay h2 { font-family: 'Space Grotesk',sans-serif; font-size: 1.4rem; margin-bottom: 8px; }
        .overlay p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
        .btn-close {
            background: var(--primary);
            color: white;
            border: none;
            padding: 13px 30px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: 0.2s;
        }
        .btn-close:hover { transform: scale(1.03); }

        /* Loading model screen */
        .loading-screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            gap: 16px;
            transition: opacity 0.6s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-pet { font-size: 60px; animation: bob 1s ease-in-out infinite alternate; }
        @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-12px); } }
        .loading-text { color: var(--muted); font-size: 0.88rem; }
        .loading-bar-track {
            width: 180px; height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

<div class="app">

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-pet">🥚</div>
        <div style="font-weight:800; font-size:1.1rem;">EmoPet.</div>
        <div class="loading-bar-track"><div class="loading-bar-fill" id="loadBar"></div></div>
        <div class="loading-text" id="loadText">Memuat AI wajah...</div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo">EmoPet.</div>
        <div class="level-badge">Lv. <span id="petLevel">1</span></div>
    </header>

    <!-- MAIN -->
    <div class="main-content">

        <!-- CAMERA -->
        <div class="camera-section">
            <video id="videoEl" autoplay muted playsinline></video>
            <canvas id="faceCanvas"></canvas>
            <div class="camera-overlay"></div>
            <div class="face-frame">
                <div class="corner-br"></div>
                <div class="corner-bl"></div>
            </div>
            <div class="cam-status">
                <div class="cam-dot" id="camDot"></div>
                <span id="camLabel">Memulai kamera...</span>
            </div>
            <div class="emotion-tag" id="emotionTag">—</div>
        </div>

        <!-- PET -->
        <div class="pet-section">
            <div class="pet-wrap">
                <div class="pet-aura" id="petAura"></div>
                <div class="pet-emoji" id="petEmoji">🥚</div>
            </div>
            <div class="pet-mood-label" id="petMoodLabel">Menunggu ekspresimu...</div>

            <div style="height: 12px;"></div>

            <!-- EMOTION BARS -->
            <div class="emotion-bars">
                <div class="emo-bar-row">
                    <span class="emo-bar-label">😊 Senang</span>
                    <div class="emo-bar-track"><div class="emo-bar-fill bar-happy" id="bar-happy"></div></div>
                    <span class="emo-bar-val" id="val-happy">0%</span>
                </div>
                <div class="emo-bar-row">
                    <span class="emo-bar-label">😢 Sedih</span>
                    <div class="emo-bar-track"><div class="emo-bar-fill bar-sad" id="bar-sad"></div></div>
                    <span class="emo-bar-val" id="val-sad">0%</span>
                </div>
                <div class="emo-bar-row">
                    <span class="emo-bar-label">😠 Marah</span>
                    <div class="emo-bar-track"><div class="emo-bar-fill bar-angry" id="bar-angry"></div></div>
                    <span class="emo-bar-val" id="val-angry">0%</span>
                </div>
                <div class="emo-bar-row">
                    <span class="emo-bar-label">😨 Takut</span>
                    <div class="emo-bar-track"><div class="emo-bar-fill bar-fearful" id="bar-fearful"></div></div>
                    <span class="emo-bar-val" id="val-fearful">0%</span>
                </div>
                <div class="emo-bar-row">
                    <span class="emo-bar-label">😲 Kaget</span>
                    <div class="emo-bar-track"><div class="emo-bar-fill bar-surprised" id="bar-surprised"></div></div>
                    <span class="emo-bar-val" id="val-surprised">0%</span>
                </div>
                <div class="emo-bar-row">
                    <span class="emo-bar-label">😐 Netral</span>
                    <div class="emo-bar-track"><div class="emo-bar-fill bar-neutral" id="bar-neutral"></div></div>
                    <span class="emo-bar-val" id="val-neutral">0%</span>
                </div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-section">
            <div class="transcript-box" id="transcript">Curhatlah... aku mendengarkan. 💬</div>
            <div class="controls">
                <div>
                    <button class="mic-btn" id="micBtn">🎤</button>
                    <div class="hint-text" style="margin-top:6px;">Curhat suara</div>
                </div>
            </div>
        </div>
    </div>

    <!-- OVERLAY SUCCESS -->
    <div class="overlay" id="overlaySuccess">
        <div class="overlay-icon" id="overlayIcon">🍏</div>
        <h2 id="overlayTitle">Oke!</h2>
        <p id="overlayDesc">Pet kamu tumbuh.</p>
        <button class="btn-close" onclick="closeOverlay()">Lanjut →</button>
    </div>
</div>

<script>
// ——————————————————————————————————————
// STATE
// ——————————————————————————————————————
let petLevel = 1;
let recognition;
let faceDetectionInterval;
let currentDominantEmotion = 'neutral';
let lastEmotionFromFace = 'neutral';

const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';

// DOM
const videoEl    = document.getElementById('videoEl');
const faceCanvas = document.getElementById('faceCanvas');
const loadBar    = document.getElementById('loadBar');
const loadText   = document.getElementById('loadText');
const loadScreen = document.getElementById('loadingScreen');
const camDot     = document.getElementById('camDot');
const camLabel   = document.getElementById('camLabel');
const emotionTag = document.getElementById('emotionTag');
const petEmoji   = document.getElementById('petEmoji');
const petAura    = document.getElementById('petAura');
const petMoodLabel = document.getElementById('petMoodLabel');
const petLevelEl = document.getElementById('petLevel');
const transcript = document.getElementById('transcript');
const micBtn     = document.getElementById('micBtn');

// ——————————————————————————————————————
// PET CONFIG
// ——————————————————————————————————————
const emotionConfig = {
    happy:     { emoji: '😇', aura: '#FFD166', tag: '😊 Senang!',     mood: 'Senang banget!' },
    sad:       { emoji: '🥺', aura: '#6EB5FF', tag: '😢 Sedih...',    mood: 'Lagi sedih nih...' },
    angry:     { emoji: '👹', aura: '#FF5370', tag: '😠 Marah!',      mood: 'Wah lagi emosi!' },
    fearful:   { emoji: '🙈', aura: '#C084FC', tag: '😨 Takut...',    mood: 'Serem yaaa...' },
    surprised: { emoji: '🤩', aura: '#00E5C0', tag: '😲 Kaget!',      mood: 'Woah, kaget!' },
    disgusted: { emoji: '🤢', aura: '#84CC16', tag: '🤢 Jijik!',      mood: 'Ewwww...' },
    neutral:   { emoji: '🐣', aura: '#7C6EFA', tag: '😐 Netral',      mood: 'Kalem aja nih...' },
};

// ——————————————————————————————————————
// INIT
// ——————————————————————————————————————
async function init() {
    try {
        setLoadProgress(10, 'Memuat model Tiny Face Detector...');
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);

        setLoadProgress(45, 'Memuat model ekspresi wajah...');
        await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

        setLoadProgress(80, 'Menyalakan kamera...');
        await startCamera();

        setLoadProgress(100, 'Siap!');
        setTimeout(() => loadScreen.classList.add('hidden'), 700);

        startFaceDetection();
        setupSpeech();
    } catch(e) {
        loadText.innerText = 'Error: ' + e.message;
        console.error(e);
    }
}

function setLoadProgress(pct, text) {
    loadBar.style.width = pct + '%';
    loadText.innerText = text;
}

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    videoEl.srcObject = stream;
    return new Promise(res => videoEl.onloadedmetadata = res);
}

// ——————————————————————————————————————
// FACE DETECTION LOOP
// ——————————————————————————————————————
function startFaceDetection() {
    camDot.classList.add('active');
    camLabel.innerText = 'Kamera aktif';

    faceDetectionInterval = setInterval(async () => {
        if (videoEl.readyState !== 4) return;

        // Match canvas to video display size
        const displaySize = { width: videoEl.videoWidth, height: videoEl.videoHeight };
        faceapi.matchDimensions(faceCanvas, displaySize);

        const detections = await faceapi
            .detectAllFaces(videoEl, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 }))
            .withFaceExpressions();

        const ctx = faceCanvas.getContext('2d');
        ctx.clearRect(0, 0, faceCanvas.width, faceCanvas.height);

        if (detections.length > 0) {
            const resized = faceapi.resizeResults(detections, displaySize);

            // Draw minimal detection box
            resized.forEach(det => {
                const box = det.detection.box;
                ctx.strokeStyle = 'rgba(0, 229, 192, 0.6)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(box.x, box.y, box.width, box.height);
            });

            // Get expressions from first face
            const expr = detections[0].expressions;
            updateEmotionBars(expr);

            // Find dominant
            const dominant = Object.entries(expr).sort((a,b) => b[1]-a[1])[0][0];
            lastEmotionFromFace = dominant;
            updatePet(dominant);

        } else {
            // No face — slowly fade bars
            updateEmotionBars({ happy:0, sad:0, angry:0, fearful:0, surprised:0, disgusted:0, neutral:0 });
            emotionTag.innerText = '— Wajah tidak terdeteksi';
        }
    }, 300);
}

function updateEmotionBars(expr) {
    const map = {
        happy:     'happy',
        sad:       'sad',
        angry:     'angry',
        fearful:   'fearful',
        surprised: 'surprised',
        neutral:   'neutral',
    };
    for (const [key, barKey] of Object.entries(map)) {
        const val = (expr[key] || 0);
        const pct = Math.round(val * 100);
        document.getElementById('bar-' + barKey).style.width = pct + '%';
        document.getElementById('val-' + barKey).innerText = pct + '%';
    }
}

function updatePet(emotion) {
    const cfg = emotionConfig[emotion] || emotionConfig.neutral;
    if (emotion === currentDominantEmotion) return;
    currentDominantEmotion = emotion;

    petEmoji.innerText = cfg.emoji;
    petAura.style.background = `radial-gradient(circle, ${cfg.aura}33 0%, transparent 70%)`;
    petMoodLabel.innerText = cfg.mood;
    emotionTag.innerText = cfg.tag;

    // Bounce animation
    petEmoji.style.transform = 'scale(1.3)';
    setTimeout(() => petEmoji.style.transform = 'scale(1)', 400);
}

// ——————————————————————————————————————
// SPEECH RECOGNITION (Curhat)
// ——————————————————————————————————————
function setupSpeech() {
    if (!('webkitSpeechRecognition' in window)) return;
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'id-ID';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        micBtn.classList.add('listening');
        transcript.innerText = '🎙️ Mendengarkan...';
        transcript.classList.remove('has-text');
    };
    recognition.onend = () => {
        micBtn.classList.remove('listening');
    };
    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        transcript.innerText = `"${text}"`;
        transcript.classList.add('has-text');
        processCurhat(text.toLowerCase());
    };
    recognition.onerror = () => {
        transcript.innerText = 'Error mic. Coba lagi.';
        micBtn.classList.remove('listening');
    };
}

function detectEmotionFromText(text) {
    if (text.match(/marah|kesel|benci|sial|bangsat|jengkel|emosi|ribet/)) return 'angry';
    if (text.match(/sedih|nangis|galau|sepi|lelah|kecewa|putus|hampa|rindu/)) return 'sad';
    if (text.match(/senang|bahagia|syukur|alhamdulillah|senyum|tawa|haha|wkwk|mantap|asik/)) return 'happy';
    if (text.match(/takut|khawatir|cemas|was-was|gelisah|ngeri/)) return 'fearful';
    if (text.match(/kaget|terkejut|wow|gila|serius|beneran/)) return 'surprised';
    return null;
}

function processCurhat(text) {
    // Combine: text emotion wins if detected, otherwise use face
    const textEmotion = detectEmotionFromText(text);
    const finalEmotion = textEmotion || lastEmotionFromFace;

    petLevel++;
    petLevelEl.innerText = petLevel;

    showResultOverlay(finalEmotion, text);
}

function showResultOverlay(emotion, text) {
    const cfg = emotionConfig[emotion] || emotionConfig.neutral;
    const overlay = document.getElementById('overlaySuccess');

    const foodMap = { happy:'🌞', sad:'☔', angry:'🌶️', fearful:'🫣', surprised:'✨', disgusted:'🤢', neutral:'🍏' };
    const respMap = {
        happy:     'Aura positif kamu mengisi pet dengan sinar! ☀️',
        sad:       'Aku di sini. Peluk dulu yuk. 🫂',
        angry:     'Whoa, energinya kuat! Mau curhat lebih dalam? 🔥',
        fearful:   'Tenang, kamu aman di sini. 🫶',
        surprised: 'Wow! Kaget juga aku! ✨',
        disgusted: 'Eww! Tapi kamu tetap kuat! 💪',
        neutral:   'Oke, makanan sehat! Pet tetap stabil. 🌿',
    };

    document.getElementById('overlayIcon').innerText = foodMap[emotion] || '🍏';
    document.getElementById('overlayTitle').innerText = cfg.tag;
    document.getElementById('overlayDesc').innerText = respMap[emotion] || respMap.neutral;

    overlay.classList.add('active');
}

function closeOverlay() {
    document.getElementById('overlaySuccess').classList.remove('active');
    transcript.innerText = 'Ada yang lain? Aku siap mendengar. 💬';
    transcript.classList.remove('has-text');
}

micBtn.addEventListener('click', () => {
    if (recognition) recognition.start();
});

init();
</script>
